<div class="page-header">
    <h2><i class="fas fa-calendar-check" style="margin-right:10px;color:var(--emerald)"></i>Mes présences</h2>
    <div style="display:flex;gap:10px;align-items:center;">
        <span class="badge green" style="padding:6px 14px;font-size:13px;">
            <i class="fas fa-check-circle"></i> <span id="tauxPresence">80</span>% de présence
        </span>
        <span class="badge red" style="padding:6px 14px;font-size:13px;">
            <i class="fas fa-times-circle"></i> <span id="totalAbsences">3</span> absences
        </span>
    </div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
    <div class="card">
        <div class="card-header">
            <div class="card-title"><i class="fas fa-chart-pie" style="margin-right:8px;color:var(--emerald)"></i>Statistiques</div>
        </div>
        <div style="padding:20px;">
            <div style="margin-bottom:16px;">
                <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
                    <span>Présences</span>
                    <span><strong id="tauxPresenceBar">80%</strong></span>
                </div>
                <div style="height:8px;background:#f1f5f9;border-radius:10px;overflow:hidden;">
                    <div style="height:100%;width:80%;background:var(--emerald);border-radius:10px;transition:width 0.5s;" id="presenceBar"></div>
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div style="background:#f8fafc;border-radius:10px;padding:12px;text-align:center;">
                    <div style="font-size:11px;color:var(--text-muted);">Total jours</div>
                    <div style="font-weight:700;font-size:22px;" id="totalJours">15</div>
                </div>
                <div style="background:#f8fafc;border-radius:10px;padding:12px;text-align:center;">
                    <div style="font-size:11px;color:var(--text-muted);">Présents</div>
                    <div style="font-weight:700;font-size:22px;color:var(--emerald);" id="totalPresents">12</div>
                </div>
                <div style="background:#f8fafc;border-radius:10px;padding:12px;text-align:center;">
                    <div style="font-size:11px;color:var(--text-muted);">Absents</div>
                    <div style="font-weight:700;font-size:22px;color:var(--danger);" id="totalAbsents">3</div>
                </div>
                <div style="background:#f8fafc;border-radius:10px;padding:12px;text-align:center;">
                    <div style="font-size:11px;color:var(--text-muted);">Taux présence</div>
                    <div style="font-weight:700;font-size:22px;color:var(--gold);" id="tauxPresenceStat">80%</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="card-title"><i class="fas fa-list" style="margin-right:8px;color:var(--info)"></i>Historique</div>
            <select class="filter-select" style="padding:4px 8px;font-size:12px;" id="presenceFilter" onchange="filterPresences(this.value)">
                <option value="all">Tous</option>
                <option value="present">Présents</option>
                <option value="absent">Absents</option>
            </select>
        </div>
        <div style="padding:12px 16px;max-height:300px;overflow-y:auto;" id="presenceList">
        </div>
    </div>
</div>
